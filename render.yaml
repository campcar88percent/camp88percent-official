services:
  - type: web
    name: nago-camp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: BASE_URL
        sync: false
