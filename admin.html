<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88CAMPCAR — 予約管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
    background: #f5f5f5; color: #111; line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: #111; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 15px; font-weight: 900; letter-spacing: .06em; }
  .header h1 span { color: #f97316; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 100px; font-size: 10px; font-weight: 700;
  }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-confirmed { background: #d1fae5; color: #065f46; }
  .badge-cancelled { background: #fee2e2; color: #991b1b; }
  .btn-logout {
    background: transparent; border: 1px solid rgba(255,255,255,.2);
    color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 10px;
    font-weight: 700; cursor: pointer; transition: all .15s;
  }
  .btn-logout:hover { background: #f97316; border-color: #f97316; }

  /* ── Login ── */
  .login-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #111; display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: #fff; padding: 40px; border-radius: 12px;
    width: 100%; max-width: 360px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .login-box h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .login-box p { font-size: 12px; color: #888; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px;
    font-size: 14px; font-weight: 600; text-align: center; outline: none;
    transition: border-color .15s;
  }
  .login-box input:focus { border-color: #f97316; }
  .login-box button {
    width: 100%; padding: 14px; margin-top: 12px; background: #111; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 800;
    cursor: pointer; letter-spacing: .05em; transition: background .15s;
  }
  .login-box button:hover { background: #f97316; }
  .login-err { color: #ef4444; font-size: 12px; font-weight: 700; margin-top: 10px; }
  .login-diag { color: #666; font-size: 11px; margin-top: 8px; line-height: 1.4; word-break: break-all; }
  .login-overlay.hidden { display: none; }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex; gap: 16px; padding: 14px 24px; flex-wrap: wrap;
    border-bottom: 1px solid #e5e5e5; background: #fff;
  }
  .stat-item {
    display: flex; align-items: baseline; gap: 5px;
    font-size: 11px; font-weight: 700; color: #888;
  }
  .stat-item strong { font-size: 20px; color: #111; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 8px; padding: 14px 24px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 5px 14px; border: 1.5px solid #ddd; border-radius: 100px;
    font-size: 11px; font-weight: 700; cursor: pointer; background: #fff;
    transition: all .15s; color: #555;
  }
  .filter-btn:hover { border-color: #111; color: #111; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }
  .search-input {
    margin-left: auto; padding: 7px 14px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 12px; width: 220px; outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: #f97316; }

  /* ── Card List ── */
  .card-list { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;
    overflow: hidden; transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.05); }
  .card-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    cursor: pointer; user-select: none;
  }
  .card-header:hover { background: #fafafa; }
  .card-name { font-weight: 800; font-size: 14px; flex: 1; }
  .card-dates { font-size: 12px; color: #666; font-weight: 600; white-space: nowrap; }
  .card-plan {
    font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
  }
  .plan-short { background: #f3f4f6; color: #555; }
  .plan-medium { background: #dbeafe; color: #1d4ed8; }
  .plan-weekly { background: #ffedd5; color: #c2410c; }
  .card-chevron {
    width: 18px; height: 18px; transition: transform .2s;
    color: #ccc; flex-shrink: 0;
  }
  .card-chevron.open { transform: rotate(180deg); }

  /* ── Card Detail ── */
  .card-body { display: none; padding: 0 16px 16px; }
  .card-body.open { display: block; }
  .detail-grid {
    display: grid; grid-template-columns: 90px 1fr;
    gap: 3px 12px; font-size: 13px; margin-bottom: 12px;
  }
  .detail-label { color: #999; font-weight: 600; padding: 4px 0; }
  .detail-value { font-weight: 600; word-break: break-all; padding: 4px 0; }
  .detail-value a { color: #f97316; text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }

  .license-thumbs { display: flex; gap: 10px; margin-bottom: 12px; }
  .license-thumb {
    width: 110px; height: 70px; border-radius: 6px; border: 1px solid #e5e5e5;
    object-fit: cover; cursor: pointer; transition: transform .15s;
  }
  .license-thumb:hover { transform: scale(1.05); }

  .action-bar { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
  .action-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700;
    cursor: pointer; border: 1.5px solid transparent; transition: all .15s;
  }
  .btn-confirm { background: #065f46; color: #fff; }
  .btn-confirm:hover { background: #047857; }
  .btn-cancel { background: #fff; border-color: #ef4444; color: #ef4444; }
  .btn-cancel:hover { background: #fef2f2; }
  .btn-pending { background: #fff; border-color: #f59e0b; color: #92400e; }
  .btn-pending:hover { background: #fffbeb; }
  .btn-delete { background: #fff; border-color: #ddd; color: #999; margin-left: auto; }
  .btn-delete:hover { background: #fee2e2; border-color: #ef4444; color: #ef4444; }

  .empty-state {
    text-align: center; padding: 60px 24px; color: #bbb;
    font-size: 14px; font-weight: 600;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.85);
    display: none; align-items: center; justify-content: center; cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* ── Toast ── */
  .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 400; display: flex; flex-direction: column; gap: 6px; }
  .toast {
    background: #111; color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 12px; font-weight: 700; box-shadow: 0 6px 20px rgba(0,0,0,.2);
    animation: toastIn .3s ease;
  }
  .toast.error { background: #ef4444; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .stats-bar { gap: 10px; padding: 10px 16px; }
    .stat-item strong { font-size: 17px; }
    .toolbar { padding: 10px 16px; }
    .search-input { width: 100%; margin-left: 0; margin-top: 4px; }
    .card-list { padding: 0 10px 16px; }
    .card-header { padding: 10px 12px; flex-wrap: wrap; gap: 6px; }
    .card-body { padding: 0 12px 12px; }
    .detail-grid { grid-template-columns: 78px 1fr; font-size: 12px; }
    .license-thumb { width: 80px; height: 50px; }
    .card-dates { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>88CAMPCAR</h2>
    <p>管理画面にログイン</p>
    <input type="password" id="login-pass" placeholder="パスワード" autocomplete="off" />
    <button id="login-btn">ログイン</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-diag" id="login-diag"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>88CAMPCAR 予約管理</h1>
  <div class="header-right">
    <span class="badge badge-pending" id="hdr-pending">0 受付中</span>
    <span class="badge badge-confirmed" id="hdr-confirmed">0 確定</span>
    <button class="btn-logout" id="btn-logout">ログアウト</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-item"><strong id="s-total">0</strong> 全予約</div>
  <div class="stat-item"><strong id="s-pending" style="color:#f59e0b;">0</strong> 受付中</div>
  <div class="stat-item"><strong id="s-confirmed" style="color:#059669;">0</strong> 確定</div>
  <div class="stat-item"><strong id="s-cancelled" style="color:#ef4444;">0</strong> キャンセル</div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="pending">受付中</button>
  <button class="filter-btn" data-filter="confirmed">確定</button>
  <button class="filter-btn" data-filter="cancelled">キャンセル</button>
  <input type="search" class="search-input" id="search-input" placeholder="名前・メール・電話で検索…" />
</div>

<!-- Card List -->
<div class="card-list" id="card-list"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox"><img id="lightbox-img" src="" alt="拡大" /></div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ローカル環境は 127.0.0.1:3000 に統一して、localhost の名前解決差異を回避する
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const localTarget = `http://127.0.0.1:3000${location.pathname}${location.search}${location.hash}`;
  if (location.href !== localTarget) {
    location.replace(localTarget);
  }
}

// ── State ──
let reservations = [];
let currentFilter = 'all';
let searchQuery = '';
let csrfToken = '';
let hadAuthenticatedSession = false;
let sessionExpiredNotified = false;

// ── DOM ──
const $ = id => document.getElementById(id);
const loginOverlay = $('login-overlay');
const loginPass = $('login-pass');
const loginBtn = $('login-btn');
const loginErr = $('login-err');
const loginDiag = $('login-diag');
const cardList = $('card-list');
const searchInput = $('search-input');
const lightbox = $('lightbox');
const lightboxImg = $('lightbox-img');

const localApiBase = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://127.0.0.1:3000'
  : '';
const adminApiPrefix = '/x1/r';
const healthPath = '/x1/ping';
const suggestedAdminUrl = `${location.origin}/admin.html`;

async function apiFetch(input, init = {}) {
  const opts = { credentials: 'same-origin', ...init };
  try {
    return await fetch(input, opts);
  } catch (firstErr) {
    // iPhone の一部ブラウザ/インアプリWebViewで fetch が失敗する場合に XHR へフォールバック
    try {
      return await xhrFetchLike(input, opts);
    } catch (secondErr) {
      if (typeof input === 'string' && input.startsWith('/') && localApiBase) {
        try {
          return await fetch(`${localApiBase}${input}`, opts);
        } catch {
          return xhrFetchLike(`${localApiBase}${input}`, opts);
        }
      }
      throw secondErr || firstErr;
    }
  }
}

function xhrFetchLike(input, init = {}) {
  return new Promise((resolve, reject) => {
    const url = typeof input === 'string' ? input : String(input);
    const method = (init.method || 'GET').toUpperCase();
    const headers = init.headers || {};
    const body = init.body;
    const timeoutMs = 10_000;

    const xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    xhr.withCredentials = true;
    xhr.timeout = timeoutMs;

    if (headers && typeof headers === 'object') {
      for (const [k, v] of Object.entries(headers)) {
        if (typeof v !== 'undefined') xhr.setRequestHeader(k, String(v));
      }
    }

    xhr.onload = () => {
      const responseText = xhr.responseText || '';
      const status = xhr.status || 0;
      resolve({
        ok: status >= 200 && status < 300,
        status,
        text: async () => responseText,
        json: async () => {
          try { return JSON.parse(responseText || '{}'); }
          catch { throw new Error('Invalid JSON response'); }
        }
      });
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Network timeout'));

    if (typeof body === 'undefined' || body === null) xhr.send();
    else xhr.send(body);
  });
}

function renderDiag(msg) {
  if (!loginDiag) return;
  loginDiag.textContent = `現在: ${location.origin}${location.pathname} | ${msg}`;
}

async function checkApiConnectivity() {
  try {
    const r = await apiFetch(healthPath, { cache: 'no-store' });
    if (!r.ok) {
      renderDiag(`API応答異常 (${r.status})`);
      return;
    }
    renderDiag('API接続OK');
  } catch {
    renderDiag('API接続NG（ブラウザ側の通信遮断の可能性）');
  }
}

// ── Auth ──
load();
renderDiag('診断中...');
checkApiConnectivity();

loginBtn.addEventListener('click', tryLogin);
loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
$('btn-logout').addEventListener('click', async () => {
  try {
    await apiFetch(`${adminApiPrefix}/logout`, {
      method: 'POST',
      headers: csrfToken ? { 'X-CSRF-Token': csrfToken } : {}
    });
  } catch {}
  location.reload();
});

async function tryLogin() {
  const p = loginPass.value.trim();
  if (!p) return;
  loginErr.textContent = '';
  try {
    const r = await apiFetch(`${adminApiPrefix}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: p })
    });
    if (r.status === 401) {
      loginErr.textContent = 'パスワードが正しくありません';
      loginPass.select();
      return;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    sessionExpiredNotified = false;
    loginOverlay.classList.add('hidden');
    await load();
  } catch {
    if (location.protocol === 'file:') {
      loginErr.textContent = 'このページはURL直開き不可です。http://127.0.0.1:3000/admin.html で開いてください。';
      return;
    }
    loginErr.textContent = `サーバーに接続できません。${suggestedAdminUrl} を開き直してください。`;
  }
}

// ── Load ──
async function load() {
  try {
    const r = await apiFetch(`${adminApiPrefix}/list`);
    if (r.status === 401) {
      csrfToken = '';
      if (hadAuthenticatedSession && !sessionExpiredNotified) {
        loginErr.textContent = 'セッションの有効期限が切れました。再ログインしてください。';
        toast('セッションが切れました。再ログインしてください。', true);
        sessionExpiredNotified = true;
      }
      loginOverlay.classList.remove('hidden');
      return;
    }
    reservations = await r.json();
    await fetchCsrfToken();
    render();
    hadAuthenticatedSession = true;
    loginErr.textContent = '';
    loginOverlay.classList.add('hidden');
  } catch (e) {
    console.error(e);
    loginOverlay.classList.remove('hidden');
    if (location.protocol === 'file:') {
      loginErr.textContent = '管理画面は http://127.0.0.1:3000/admin.html で開いてください。';
    } else {
      loginErr.textContent = `サーバーに接続できません。${suggestedAdminUrl} を開き直してください。`;
    }
  }
}

async function fetchCsrfToken() {
  try {
    const r = await apiFetch(`${adminApiPrefix}/csrf`, { cache: 'no-store' });
    if (!r.ok) throw new Error('csrf');
    const data = await r.json();
    csrfToken = data.csrfToken || '';
  } catch {
    csrfToken = '';
  }
}

// ── Helpers ──
function plan(s, e) {
  const n = Math.round((new Date(e) - new Date(s)) / 864e5);
  if (n >= 7) return { name: 'Weekly Plan', cls: 'plan-weekly', ppd: 19000, n };
  if (n >= 4) return { name: 'Medium Plan', cls: 'plan-medium', ppd: 22000, n };
  return { name: 'Short Stay', cls: 'plan-short', ppd: 26000, n };
}

function sBadge(s) {
  const m = { pending: ['badge-pending','受付中'], confirmed: ['badge-confirmed','確定'], cancelled: ['badge-cancelled','キャンセル'] };
  const [c, t] = m[s] || m.pending;
  return `<span class="badge ${c}">${t}</span>`;
}

function fmtD(d) { return d ? d.replace(/-/g, '/') : '—'; }
function fmtDT(iso) { return iso ? new Date(iso).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }) : '—'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function licenseUrl(filename) {
  return `${adminApiPrefix}/license/${encodeURIComponent(filename)}`;
}

// ── Render ──
function render() {
  const pn = reservations.filter(r => r.status === 'pending').length;
  const cn = reservations.filter(r => r.status === 'confirmed').length;
  const xn = reservations.filter(r => r.status === 'cancelled').length;
  $('s-total').textContent = reservations.length;
  $('s-pending').textContent = pn;
  $('s-confirmed').textContent = cn;
  $('s-cancelled').textContent = xn;
  $('hdr-pending').textContent = `${pn} 受付中`;
  $('hdr-confirmed').textContent = `${cn} 確定`;

  let list = [...reservations];
  if (currentFilter !== 'all') list = list.filter(r => r.status === currentFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r => [r.name, r.email, r.phone].some(v => (v || '').toLowerCase().includes(q)));
  }

  if (!list.length) { cardList.innerHTML = '<div class="empty-state">予約がありません</div>'; return; }

  cardList.innerHTML = list.map(r => {
    const p = plan(r.start, r.end);
    const tot = p.ppd * p.n;
    return `
      <div class="card" data-id="${r.id}">
        <div class="card-header" onclick="toggle('${r.id}')">
          ${sBadge(r.status)}
          <span class="card-name">${esc(r.name)}</span>
          <span class="card-plan ${p.cls}">${p.name}</span>
          <span class="card-dates">${fmtD(r.start)} → ${fmtD(r.end)}</span>
          <svg class="card-chevron" id="ch-${r.id}" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>
        </div>
        <div class="card-body" id="bd-${r.id}">
          <div class="detail-grid">
            <span class="detail-label">予約ID</span><span class="detail-value" style="font-size:11px;color:#aaa;">${r.id}</span>
            <span class="detail-label">お名前</span><span class="detail-value">${esc(r.name)}</span>
            <span class="detail-label">メール</span><span class="detail-value"><a href="mailto:${esc(r.email)}">${esc(r.email)}</a></span>
            <span class="detail-label">電話</span><span class="detail-value"><a href="tel:${esc(r.phone)}">${esc(r.phone)}</a></span>
            <span class="detail-label">プラン</span><span class="detail-value" style="color:#f97316;font-weight:800;">${p.name}（${p.n}泊）</span>
            <span class="detail-label">期間</span><span class="detail-value">${r.start} → ${r.end}</span>
            <span class="detail-label">料金</span><span class="detail-value" style="font-size:15px;font-weight:800;">¥${tot.toLocaleString()} <span style="font-size:11px;color:#999;">(¥${p.ppd.toLocaleString()}/日)</span></span>
            <span class="detail-label">車両</span><span class="detail-value">${esc(r.vehicle || '—')}</span>
            <span class="detail-label">受付</span><span class="detail-value">${fmtDT(r.createdAt)}</span>
            ${r.updatedAt ? `<span class="detail-label">更新</span><span class="detail-value">${fmtDT(r.updatedAt)}</span>` : ''}
          </div>
          ${(r.licenseFront || r.licenseBack) ? `
            <div style="font-size:11px;font-weight:700;color:#999;margin-bottom:4px;">免許証</div>
            <div class="license-thumbs">
              ${r.licenseFront ? `<img class="license-thumb" src="${licenseUrl(r.licenseFront)}" alt="表" onclick="openLB('${licenseUrl(r.licenseFront)}')" />` : ''}
              ${r.licenseBack ? `<img class="license-thumb" src="${licenseUrl(r.licenseBack)}" alt="裏" onclick="openLB('${licenseUrl(r.licenseBack)}')" />` : ''}
            </div>` : ''}
          <div class="action-bar">
            ${r.status !== 'confirmed' ? `<button class="action-btn btn-confirm" onclick="act('${r.id}','confirmed')">✓ 確定</button>` : ''}
            ${r.status !== 'cancelled' ? `<button class="action-btn btn-cancel" onclick="act('${r.id}','cancelled')">✗ キャンセル</button>` : ''}
            ${r.status !== 'pending' ? `<button class="action-btn btn-pending" onclick="act('${r.id}','pending')">↩ 受付中に戻す</button>` : ''}
            <button class="action-btn btn-delete" onclick="del('${r.id}','${esc(r.name)}')">🗑 削除</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Toggle ──
function toggle(id) {
  $(`bd-${id}`).classList.toggle('open');
  $(`ch-${id}`).classList.toggle('open');
}

// ── Actions ──
async function act(id, status) {
  try {
    const r = await apiFetch(`${adminApiPrefix}/item/${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfToken
      },
      body: JSON.stringify({ status })
    });
    if (r.status === 403) {
      await fetchCsrfToken();
      throw new Error('再ログイン後に再試行してください');
    }
    if (!r.ok) throw 0;
    const label = { confirmed: '確定', cancelled: 'キャンセル', pending: '受付中' }[status];
    toast(`ステータスを「${label}」に変更`);
    load();
  } catch (err) { toast(err.message || '操作に失敗しました', true); }
}

async function del(id, name) {
  if (!confirm(`${name}様の予約を削除しますか？\n（免許証画像も削除されます）`)) return;
  try {
    const r = await apiFetch(`${adminApiPrefix}/item/${id}`, {
      method: 'DELETE',
      headers: { 'X-CSRF-Token': csrfToken }
    });
    if (r.status === 403) {
      await fetchCsrfToken();
      throw new Error('再ログイン後に再試行してください');
    }
    if (!r.ok) throw 0;
    toast('予約を削除しました'); load();
  } catch (err) { toast(err.message || '削除に失敗しました', true); }
}

// ── Lightbox ──
function openLB(src) { lightboxImg.src = src; lightbox.classList.add('show'); }
lightbox.addEventListener('click', () => { lightbox.classList.remove('show'); lightboxImg.src = ''; });

// ── Toast ──
function toast(msg, err = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (err ? ' error' : '');
  el.textContent = msg;
  $('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Filters ──
document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    render();
  });
});
searchInput.addEventListener('input', e => { searchQuery = e.target.value; render(); });

// ── Auto-refresh 30s ──
setInterval(() => { if (document.visibilityState === 'visible') load(); }, 30000);
</script>
</body>
</html>
